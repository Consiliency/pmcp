name: Governed Pipeline Bootstrap

on:
  repository_dispatch:
    types:
      - ratification.passed
  workflow_dispatch:
    inputs:
      pipeline_branch:
        description: "Branch the pipeline should operate against. Empty = default branch (legacy)."
        required: false
        type: string
        default: ""

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      BRANCHGOV_ENABLE: ${{ vars.BRANCHGOV_ENABLE || 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pipeline_branch || github.event.repository.default_branch }}

      - name: Handle BranchGov merge-back
        if: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'ratification.passed' }}
        run: |
          npm exec --package @consiliency/pipeline-runtime@0.1.0 -- node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          import { handleRatificationPassed } from '@consiliency/pipeline-runtime/workflow/branchgov-mergeback';

          const event = JSON.parse(await readFile(process.env.GITHUB_EVENT_PATH, 'utf8'));
          const result = await handleRatificationPassed(event.client_payload ?? {}, process.env);
          console.log(JSON.stringify(result));
          NODE

      - name: Run pipeline init
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npx pipeline-init --yes
