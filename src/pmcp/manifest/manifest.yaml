      linux: ["npx", "-y", "@supabase/mcp-server-supabase", "--project-ref", "${SUPABASE_PROJECT_REF}"]
      wsl: ["npx", "-y", "@supabase/mcp-server-supabase", "--project-ref", "${SUPABASE_PROJECT_REF}"]
      windows: ["npx", "-y", "@supabase/mcp-server-supabase", "--project-ref", "${SUPABASE_PROJECT_REF}"]
    command: "npx"
    args: ["-y", "@supabase/mcp-server-supabase", "--project-ref", "${SUPABASE_PROJECT_REF}"]
    requires_api_key: true
    env_var: "SUPABASE_ACCESS_TOKEN"
    env_instructions: "Set SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF from your Supabase project settings"

  # === Browser Automation ===

  puppeteer:
    status: "archived_reference_package"
    transport: "local"
