      linux: ["npx", "-y", "@modelcontextprotocol/server-postgres", "${POSTGRES_URL}"]
      wsl: ["npx", "-y", "@modelcontextprotocol/server-postgres", "${POSTGRES_URL}"]
      windows: ["npx", "-y", "@modelcontextprotocol/server-postgres", "${POSTGRES_URL}"]
